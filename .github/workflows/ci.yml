name: CI

on:
  push:
    branches: [master, main, staging]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DEV_DB_HOST: localhost
  DEV_DB_NAME: meal-diary-dev
  DEV_DB_USER: postgres
  DEV_DB_PASSWORD: postgres
  DEV_DB_PORT: 5432
  JWT_ACCESS_SECRET: ci-test-access-secret
  JWT_REFRESH_SECRET: ci-test-refresh-secret

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26.3.0
          cache: npm

      - run: sh scripts/ci-install.sh

      - run: npx turbo run test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26.3.0
          cache: npm

      - run: sh scripts/ci-install.sh

      - run: npx turbo run build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26.3.0
          cache: npm

      - run: sh scripts/ci-install.sh

      - name: Start services
        run: |
          printf '%s\n' \
            'DEV_DB_HOST=postgres' \
            'DEV_DB_NAME=meal-diary-dev' \
            'DEV_DB_USER=postgres' \
            'DEV_DB_PASSWORD=postgres' \
            'DEV_DB_PORT=5432' \
            'JWT_ACCESS_SECRET=ci-test-access-secret' \
            'JWT_REFRESH_SECRET=ci-test-refresh-secret' \
            'NODE_ENV=development' \
            > api/.env
          printf '%s\n' \
            'BASE_URL=http://localhost:3001' \
            'API_INTERNAL_URL=http://api:3001' \
            > frontend/.env
          docker compose up -d postgres api frontend

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          docker compose logs api
          exit 1

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          docker compose logs frontend
          exit 1

      - run: npx turbo run test:e2e --filter=./frontend

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
