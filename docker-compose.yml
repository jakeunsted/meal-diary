services:
  postgres:
    image: postgres:16
    container_name: meal-diary-dev-postgres
    environment:
      # Must match DEV_DB_* in api/.env (Postgres only reads these on first volume init)
      POSTGRES_DB: meal-diary-dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEV_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    container_name: meal-diary-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./api/.env
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "sh scripts/docker-install-api.sh && npm run dev --workspace=meal-diary-api"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: meal-diary-frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
    working_dir: /app
    env_file:
      - ./frontend/.env
    command: sh -c "sh scripts/docker-install-frontend.sh && npm run dev --workspace=nuxt-app"

  landing-page:
    build:
      context: .
      dockerfile: landing-page/Dockerfile.dev
    container_name: meal-diary-landing-page
    ports:
      - "3003:3003"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - landing_page_node_modules:/app/landing-page/node_modules
    working_dir: /app
    command: sh -c "sh scripts/docker-install-landing-page.sh && npm run dev --workspace=landing-page"

volumes:
  postgres_data:
  root_node_modules:
  landing_page_node_modules:
